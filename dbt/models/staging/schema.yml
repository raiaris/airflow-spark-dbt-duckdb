version: 2

models:
  - name: stg_fraud__transactions
    description: >
      Staging de transações de fraude brutas. Realiza casts de tipo e elimina
      valores inválidos no campo amount antes de expor os dados para a camada marts.
    tests:
      - elementary.volume_anomalies:
          config:
            severity: warn
      - elementary.all_columns_anomalies:
          column_anomalies:
            - null_count
            - null_percent
            - average
            - min
            - max
            - zero_count
          config:
            severity: warn
    columns:
      - name: timestamp
        data_type: bigint
        description: "Unix timestamp da transação."
        tests:
          - not_null
      - name: sending_address
        data_type: varchar
        description: "Endereço de origem da transação."
        tests:
          - not_null
      - name: receiving_address
        data_type: varchar
        description: "Endereço de destino da transação."
        tests:
          - not_null
      - name: amount
        data_type: double
        description: "Valor da transação. Nulos representam entradas originalmente 'none'."
        tests:
          - not_null:
              config:
                severity: warn
          - elementary.column_anomalies:
              column_anomalies:
                - null_count
                - null_percent
                - average
                - zero_count
              anomaly_direction: both
              config:
                severity: warn
      - name: transaction_type
        data_type: varchar
        description: "Tipo da transação (ex: compra, transferência)."
        tests:
          - not_null
      - name: location_region
        data_type: varchar
        description: "Região geográfica onde a transação foi originada."
        tests:
          - not_null
          - accepted_values:
              values: [ 'North America','South America','Asia','Africa','Europe']
              config:
                severity: warn
      - name: ip_prefix
        data_type: varchar
        description: "Prefixo do endereço IP associado à sessão."
      - name: login_frequency
        data_type: integer
        description: "Frequência de login do usuário no período recente."
      - name: session_duration
        data_type: integer
        description: "Duração da sessão em segundos."
      - name: purchase_pattern
        data_type: varchar
        description: "Padrão de comportamento de compra identificado pelo sistema."
      - name: age_group
        data_type: varchar
        description: "Faixa etária do titular da conta."
      - name: risk_score
        data_type: double
        description: "Score de risco calculado pelo sistema de detecção de fraude. Nulos representam entradas originalmente 'none'."
        tests:
          - not_null:
              config:
                severity: warn
          - elementary.column_anomalies:
              column_anomalies:
                - null_count
                - null_percent
                - average
                - zero_count
              anomaly_direction: both
              config:
                severity: warn
      - name: anomaly
        data_type: varchar
        description: "Categoria de risco da transação: high_risk, low_risk ou moderate_risk."
        tests:
          - not_null
      - name: year
        data_type: integer
        description: "Ano de ingestão — herdado da partição Iceberg."
        tests:
          - not_null
      - name: month
        data_type: integer
        description: "Mês de ingestão — herdado da partição Iceberg."
        tests:
          - not_null
      - name: day
        data_type: integer
        description: "Dia de ingestão — herdado da partição Iceberg."
        tests:
          - not_null
      - name: dagrun_id
        data_type: varchar
        description: "Identificador do DAG run do Airflow que gerou o lote."
        tests:
          - not_null
      - name: dbt_loaded_at
        data_type: timestamp
        description: "Timestamp de execução do DAG run do Airflow."
        tests:
          - not_null
